      toast.className = `toast toast--${type}`;
      const icons = { success: '✅', error: '❌', warning: '⚠️', default: 'ℹ️' };

      container.appendChild(toast);
      setTimeout(() => toast.remove(), duration);

  const REQUIRED_DOCS = ['Passport', 'Photo', 'Academic Certificate', 'Medical Examination', 'Medical Analysis', 'Visa', 'CV'];

  /**
   * Compute document completeness from a flat array of document objects.
   * Mirrors the exact logic already in _loadCandidateDocuments — no duplication.
   * @param {Object[]} docs - raw document records from api_getDocumentsByCandidate
   * @returns {{ pct:number, missingDocs:string[], presentDocs:string[] }}
   */
  const computeCompleteness = (docs) => {
    const uploadedTypes = new Set(
      (docs || [])
        .filter(d => d.ApprovalStatus !== 'Rejected')
        .map(d => (d.DocType || '').trim())
    );
    const presentDocs = REQUIRED_DOCS.filter(req => uploadedTypes.has(req));
    const missingDocs = REQUIRED_DOCS.filter(req => !uploadedTypes.has(req));
    const pct = Math.round((presentDocs.length / REQUIRED_DOCS.length) * 100);
    return { pct, missingDocs, presentDocs };
  };

        </div>

  };

  // ─────────────────────────────────────────────
  // SIDEBAR RENDERER
  // ─────────────────────────────────────────────

  const sidebar_items = [
    { view: 'dashboard', icon: '📊', label: 'Dashboard' },
    { view: 'candidates', icon: '👥', label: 'Candidates', badge: () => App.state.candidates.filter(c => c.CurrentStatus === 'Documents Requested').length || '' },
    { view: 'calendar', icon: '📅', label: 'Calendar', badge: () => (App.state.calendarEvents || []).filter(e => e.Status === 'Active').length || '' },
    { view: 'audit', icon: '📋', label: 'Audit Log' },

  const renderSidebar = () => {
    const current = App.state.currentView;
    const items = sidebar_items.map(item => {
      const badge = item.badge ? item.badge() : '';

      <div class="nav__item ${current === item.view ? 'active' : ''}"
           role="button" tabindex="0" data-label="${item.label}"

    document.getElementById('sidebar').innerHTML = `
    <div class="sidebar__toggle" onclick="App.toggleSidebar()" role="button" tabindex="0" aria-label="Toggle Sidebar">

  // ─────────────────────────────────────────────
  // VIEW DISPATCHER
  // ─────────────────────────────────────────────

  const renderView = () => {
    const view = document.getElementById('app-view');
    const { currentView } = App.state;
    if (currentView === 'dashboard') Views.dashboard(view);
    else if (currentView === 'candidates') Views.candidates(view);
    else if (currentView === 'candidate-detail') Views.candidateDetail(view);
    else if (currentView === 'new-candidate') Views.newCandidate(view);
    else if (currentView === 'calendar') Views.calendar(view);
    else if (currentView === 'audit') Views.auditLog(view);
    else view.innerHTML = '<div class="loading-overlay">404 — View not found.</div>';
  };

  // ─────────────────────────────────────────────
  // VIEWS
  // ─────────────────────────────────────────────

  const Views = {

    // ── DASHBOARD ──────────────────────────────
    dashboard(container) {
      container.innerHTML = `
      <div class="page-header">
        <div>
          <h1 class="page-header__title">Dashboard</h1>
          <p class="page-header__sub">Live overview of all mobilization cases — ${fmt.date(new Date().toISOString())}</p>
        </div>
        <div class="page-header__actions">
          <button class="btn btn--outline btn--sm" onclick="Views._refreshDashboard()" aria-label="Refresh dashboard">
            🔄 Refresh
          </button>
          <button class="btn btn--primary btn--sm" onclick="Router.navigate('new-candidate')">
            ＋ New Candidate
          </button>
        </div>
      </div>

      <!-- KPI SECTIONS -->
      <div class="kpi-section-label">📊 Pipeline Overview</div>
      <div class="kpi-grid" id="kpi-grid-status">
        ${[1, 2, 3, 4, 5, 6, 7, 8].map(() => `<div class="kpi-card"><div class="skeleton" style="height:80px"></div></div>`).join('')}
      </div>

      <div class="kpi-section-label" style="margin-top:var(--sp-5)">✅ Candidates WITH Document</div>
      <div class="kpi-grid" id="kpi-grid-has">
        ${[1, 2, 3, 4, 5, 6, 7].map(() => `<div class="kpi-card"><div class="skeleton" style="height:80px"></div></div>`).join('')}
      </div>

      <div class="kpi-section-label" style="margin-top:var(--sp-5)">❌ Candidates MISSING Document</div>
      <div class="kpi-grid" id="kpi-grid-missing">
        ${[1, 2, 3, 4, 5, 6, 7].map(() => `<div class="kpi-card"><div class="skeleton" style="height:80px"></div></div>`).join('')}
      </div>

      <div class="kpi-section-label" style="margin-top:var(--sp-5)">📅 Follow-up Calendar</div>
      <div class="kpi-grid" id="kpi-grid-calendar">
        ${[1, 2, 3, 4, 5].map(() => `<div class="kpi-card"><div class="skeleton" style="height:80px"></div></div>`).join('')}
      </div>

      <!-- HINT BAR -->
      <div id="dashboard-filter-hint" style="display:none;margin:var(--sp-3) 0;padding:var(--sp-2) var(--sp-4);
           background:var(--primary-light);border-radius:var(--radius);color:var(--primary-dark);font-size:.85rem">
        🔍 Showing filtered candidates — <strong id="dashboard-filter-label"></strong>
        <button onclick="Views._clearDashboardFilter()" style="margin-left:var(--sp-3);
        background:none;border:none;cursor:pointer;color:var(--primary-dark);font-weight:700">✕ Clear</button>
        <span style="margin-left:var(--sp-2);font-size:.78rem;opacity:.7">(CTRL+Click cards to multi-select)</span>
      </div>

      <!-- ALL CANDIDATES TABLE -->
      <div class="table-card" style="margin-top:var(--sp-4)">
        <div class="table-toolbar">
          <span class="table-toolbar__title" id="dashboard-cands-count">All Candidates</span>
          <button class="btn btn--outline btn--sm" onclick="Router.navigate('candidates')">Open Full View →</button>
        </div>
        <div id="dashboard-table">
          <div class="loading-overlay"><div class="spinner spinner--dark"></div>Loading…</div>
        </div>
      </div>`;

      // Track selected card filters
      Views._dashboardSelectedCards = new Set();
      Views._refreshDashboard();
    },

    async _refreshDashboard() {
      // State for multi-select card filtering
      if (!Views._dashboardSelectedCards) Views._dashboardSelectedCards = new Set();

      try {
        const [kpiRes, candsRes, eventsRes] = await Promise.all([
          GAS.call('api_getDashboardData'),
          GAS.call('api_getAllCandidates'),
          GAS.call('api_getAllUpcomingEvents')
        ]);

        if (eventsRes.success) {
          Views._candidateEventDots = Views._buildEventDotsMap(eventsRes.data);
        }

        if (kpiRes.success) {

          Views._injectExportButton();

          // ── Section 1: Status-based cards ──────────────────────────────
          document.getElementById('kpi-grid-status').innerHTML = [

            Views._kpiCard('Missing Documents', k.missingDocs ?? '--', '❗', 'orange', 'Incomplete document sets', null),
            Views._kpiCard('Pending Medical', k.pendingMedical ?? '--', '🩺', 'orange', 'Awaiting medical docs', { type: 'status', value: 'Pending Medical' }),
            Views._kpiCard('Booked Medical Exam', k.bookedMedical ?? '--', '📅', 'blue', 'Medical exam appointment set', { type: 'status', value: 'Booked a medical examination' }),
            Views._kpiCard('Docs Under Preparing', k.docsUnderPreparing ?? '--', '📝', 'orange', 'Documents being prepared', { type: 'status', value: 'Documents Under Preparing' }),
            Views._kpiCard('Visa Pending', k.visaPending ?? '--', '🛂', 'red', 'Awaiting visa issuance', { type: 'status', value: 'Visa Pending' }),
            Views._kpiCard('Visa Completed', k.visaCompleted ?? '--', '✅', 'green', 'Visa issued', { type: 'status', value: 'Visa Completed' }),
            Views._kpiCard('Mobilized', k.mobilized ?? '--', '✈️', 'purple', 'Successfully mobilized', { type: 'status', value: 'Mobilized' }),
          ].join('');

          // ── Section 2: HAS document cards ──────────────────────────────
          document.getElementById('kpi-grid-has').innerHTML = [
            Views._kpiCard('Has Passport', k.hasPassport ?? '--', '🛂', 'green', 'Passport uploaded & valid', { type: 'hasDoc', value: 'Passport' }),
            Views._kpiCard('Has Photo', k.hasPhoto ?? '--', '📷', 'green', 'Photo uploaded & valid', { type: 'hasDoc', value: 'Photo' }),
            Views._kpiCard('Has Academic Cert.', k.hasAcademicCert ?? '--', '🎓', 'green', 'Academic certificate uploaded', { type: 'hasDoc', value: 'Academic Certificate' }),
            Views._kpiCard('Has Medical Exam', k.hasMedicalExam ?? '--', '🩺', 'green', 'Medical examination uploaded', { type: 'hasDoc', value: 'Medical Examination' }),
            Views._kpiCard('Has Medical Analysis', k.hasMedicalAnalysis ?? '--', '🧪', 'green', 'Medical analysis uploaded', { type: 'hasDoc', value: 'Medical Analysis' }),
            Views._kpiCard('Has Visa', k.hasVisa ?? '--', '🌍', 'green', 'Visa document uploaded', { type: 'hasDoc', value: 'Visa' }),
            Views._kpiCard('Has CV', k.hasCV ?? '--', '📄', 'green', 'CV uploaded', { type: 'hasDoc', value: 'CV' }),
          ].join('');

          // ── Section 3: MISSING document cards ──────────────────────────
          document.getElementById('kpi-grid-missing').innerHTML = [
            Views._kpiCard('Missing Passport', k.missingPassport ?? '--', '🛂', 'red', 'No valid passport', { type: 'missingDoc', value: 'Passport' }),
            Views._kpiCard('Missing Photo', k.missingPhoto ?? '--', '📷', 'red', 'No valid photo', { type: 'missingDoc', value: 'Photo' }),
            Views._kpiCard('Missing Academic Cert.', k.missingAcademicCert ?? '--', '🎓', 'red', 'No academic certificate', { type: 'missingDoc', value: 'Academic Certificate' }),
            Views._kpiCard('Missing Medical Exam', k.missingMedicalExam ?? '--', '🩺', 'red', 'No medical examination', { type: 'missingDoc', value: 'Medical Examination' }),
            Views._kpiCard('Missing Medical Analysis', k.missingMedicalAnalysis ?? '--', '🧪', 'red', 'No medical analysis', { type: 'missingDoc', value: 'Medical Analysis' }),
            Views._kpiCard('Missing Visa', k.missingVisa ?? '--', '🌍', 'red', 'No visa document', { type: 'missingDoc', value: 'Visa' }),
            Views._kpiCard('Missing CV', k.missingCV ?? '--', '📄', 'red', 'No CV', { type: 'missingDoc', value: 'CV' }),
          ].join('');

          // ── Section 4: Calendar cards ──────────────────────────────
          document.getElementById('kpi-grid-calendar').innerHTML = [
            Views._kpiCard('Upcoming Today', k.eventsToday ?? '--', '📅', 'blue', 'Events scheduled for today', { type: 'calendar', value: 'Today' }),
            Views._kpiCard('Upcoming Tomorrow', k.eventsTomorrow ?? '--', '📅', 'blue', 'Events scheduled for tomorrow', { type: 'calendar', value: 'Tomorrow' }),
            Views._kpiCard('This Week', k.eventsThisWeek ?? '--', '📅', 'purple', 'Events in the next 7 days', { type: 'calendar', value: 'ThisWeek' }),
            Views._kpiCard('Overdue', k.eventsOverdue ?? '--', '⚠️', 'red', 'Events past their date', { type: 'calendar', value: 'Overdue' }),
            Views._kpiCard('High Priority', k.eventsHighPriority ?? '--', '🔥', 'orange', 'Important upcoming events', { type: 'calendar', value: 'HighPriority' }),
          ].join('');
        } else {
          const errMsg = `<div class="form-error" style="grid-column: 1/-1">Failed to load: ${escHtml(kpiRes.error)}</div>`;
          document.getElementById('kpi-grid-status').innerHTML = errMsg;
          document.getElementById('kpi-grid-has').innerHTML = errMsg;
          document.getElementById('kpi-grid-missing').innerHTML = errMsg;
          document.getElementById('kpi-grid-calendar').innerHTML = errMsg;
        }

        if (candsRes.success) {
          App.setState({ candidates: candsRes.data, filteredCandidates: candsRes.data });

        }
      } catch (err) {
        Toast.error('Failed to load dashboard data.');
        console.error(err);
      }
    },

    _kpiCard(label, value, icon, color, footer, filter) {
      const filterAttr = filter ? `data-filter-type="${filter.type}" data-filter-value="${escHtml(filter.value)}"` : '';
      const clickable = filter ? 'kpi-card--clickable' : '';
      const cardId = filter ? `id="kpi-card-${filter.type}-${filter.value.replace(/\s+/g, '_')}"` : '';
      return `
      <div class="kpi-card kpi-card--${color} ${clickable}" ${cardId} ${filterAttr}
           ${filter ? 'onclick="Views._onKpiCardClick(event, this)" tabindex="0" role="button"' : ''}
           title="${filter ? 'Click to filter · CTRL+Click to multi-select' : ''}">
        <div class="kpi-card__label">${label}</div>
        <div class="kpi-card__value">${value}</div>
        <div class="kpi-card__footer">${footer}</div>
        <div class="kpi-card__icon" aria-hidden="true">${icon}</div>
        ${filter ? '<div class="kpi-card__selected-ring" aria-hidden="true"></div>' : ''}
      </div>`;
    },

    _onKpiCardClick(event, cardEl) {
      const type = cardEl.dataset.filterType;
      const value = cardEl.dataset.filterValue;
      const key = `${type}::${value}`;

      if (type === 'calendar') {
        Router.navigate('calendar', { filter: value });
        return;
      }

      if (event.ctrlKey || event.metaKey) {
        // CTRL+Click → toggle this card in the multi-select set
        if (Views._dashboardSelectedCards.has(key)) {
          Views._dashboardSelectedCards.delete(key);
          cardEl.classList.remove('kpi-card--selected');
        } else {
          Views._dashboardSelectedCards.add(key);
          cardEl.classList.add('kpi-card--selected');
        }
      } else {
        // Normal click → single select (deselect all others first)
        document.querySelectorAll('.kpi-card--selected').forEach(el => el.classList.remove('kpi-card--selected'));
        if (Views._dashboardSelectedCards.has(key) && Views._dashboardSelectedCards.size === 1) {
          // Clicking the already-selected card alone → clear filter
          Views._dashboardSelectedCards.clear();
        } else {
          Views._dashboardSelectedCards.clear();
          Views._dashboardSelectedCards.add(key);
          cardEl.classList.add('kpi-card--selected');
        }
      }

      Views._applyDashboardCardFilter();
    },

    _applyDashboardCardFilter() {
      const filters = Array.from(Views._dashboardSelectedCards);
      const allCands = App.state.candidates;

      if (filters.length === 0) {
        // No cards selected → show all
        App.setState({ filteredCandidates: allCands });
        Views._renderDashboardTable(allCands);
        document.getElementById('dashboard-filter-hint').style.display = 'none';
        return;
      }

      // Parse selected filters
      const statusFilters = filters.filter(f => f.startsWith('status::')).map(f => f.replace('status::', ''));
      const hasDocFilters = filters.filter(f => f.startsWith('hasDoc::')).map(f => f.replace('hasDoc::', ''));
      const missingDocFilters = filters.filter(f => f.startsWith('missingDoc::')).map(f => f.replace('missingDoc::', ''));

      // Build a per-candidate has/missing doc index from docCompleteness cache
      const completeness = App.state.docCompleteness;

      const filtered = allCands.filter(c => {
        // Status filter check (OR within status group)
        if (statusFilters.length > 0 && !statusFilters.includes((c.CurrentStatus || '').trim())) return false;

        // hasDoc filter check (candidate must have ALL selected hasDoc types)
        if (hasDocFilters.length > 0) {
          const info = completeness[c.CandidateID];
          if (!info) return false;
          if (!hasDocFilters.every(dt => info.presentDocs.includes(dt))) return false;
        }

        // missingDoc filter check (candidate must be missing ALL selected doc types)
        if (missingDocFilters.length > 0) {
          const info = completeness[c.CandidateID];
          if (!info) return false;
          if (!missingDocFilters.every(dt => info.missingDocs.includes(dt))) return false;
        }

        return true;
      });

      // Update hint bar
      const labels = filters.map(f => {
        const [type, val] = f.split('::');
        return type === 'status' ? `Status: ${val}` : type === 'hasDoc' ? `Has: ${val}` : `Missing: ${val}`;
      }).join(' + ');

      document.getElementById('dashboard-filter-label').textContent = labels;
      document.getElementById('dashboard-filter-hint').style.display = 'flex';
      document.getElementById('dashboard-filter-hint').style.alignItems = 'center';
      document.getElementById('dashboard-filter-hint').style.gap = '4px';

      App.setState({ filteredCandidates: filtered });
      Views._renderDashboardTable(filtered);

      // Also pre-fetch completeness if not yet loaded (needed for hasDoc/missingDoc filtering)
      if (Object.keys(completeness).length === 0 && allCands.length > 0) {
        Views._loadAllCompleteness(allCands);
      }
    },

    _clearDashboardFilter() {
      Views._dashboardSelectedCards.clear();
      document.querySelectorAll('.kpi-card--selected').forEach(el => el.classList.remove('kpi-card--selected'));
      document.getElementById('dashboard-filter-hint').style.display = 'none';
      App.setState({ filteredCandidates: App.state.candidates });
      Views._renderDashboardTable(App.state.candidates);
    },

    _renderDashboardTable(candidates) {
      const el = document.getElementById('dashboard-table');
      const countEl = document.getElementById('dashboard-cands-count');
      if (countEl) countEl.textContent = `${candidates.length} Candidate${candidates.length !== 1 ? 's' : ''}`;

      if (!candidates.length) {
        el.innerHTML = '<div class="table-empty"><div class="table-empty__icon">👥</div>No candidates match the selected filter.</div>';
        return;
      }

      // Animate out → update → animate in
      el.style.transition = 'opacity .18s ease, transform .18s ease';
      el.style.opacity = '0';
      el.style.transform = 'translateY(6px)';

      setTimeout(() => {
        el.innerHTML = Views._candidateTableHtml(candidates);
        requestAnimationFrame(() => {
          el.style.opacity = '1';
          el.style.transform = 'translateY(0)';
        });
      }, 180);
    },

    // ── DASHBOARD EXPORT ───────────────────────

    _injectExportButton() {
      // Guard: only inject once per page render
      if (document.getElementById('dash-export-wrap')) return;
      const actions = document.querySelector('#app-view .page-header__actions');
      if (!actions) return;

      // Build the dropdown via DOM (safe — no template literal editing)
      const wrap = document.createElement('div');
      wrap.id = 'dash-export-wrap';
      wrap.style.cssText = 'position:relative;display:inline-block;vertical-align:middle';
      wrap.innerHTML =
        '<button class="btn btn--outline btn--sm" id="dash-export-btn"' +
        ' onclick="Views._toggleExportMenu()" aria-haspopup="true" aria-expanded="false">' +
        '📥 Export ▾</button>' +
        '<div id="dash-export-menu" style="display:none;position:absolute;top:calc(100% + 4px);right:0;' +
        'background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius);' +
        'box-shadow:var(--shadow-card);min-width:210px;z-index:300">' +
        '<button class="dash-export-item" onclick="Views._exportDashboardCandidates()">👥 All Candidates (CSV)</button>' +
        '<button class="dash-export-item" onclick="Views._exportDashboardKPI()">📊 KPI Summary (CSV)</button>' +
        '</div>';

      // Insert before the last button (＋ New Candidate) so it stays on the left of it
      const lastBtn = actions.lastElementChild;
      actions.insertBefore(wrap, lastBtn);
    },

    _toggleExportMenu() {
      const menu = document.getElementById('dash-export-menu');
      const btn = document.getElementById('dash-export-btn');
      if (!menu || !btn) return;
      const nowOpen = menu.style.display === 'none';
      menu.style.display = nowOpen ? 'block' : 'none';
      btn.setAttribute('aria-expanded', String(nowOpen));
      if (nowOpen) {
        const closeMenu = (e) => {
          const wrap = document.getElementById('dash-export-wrap');
          if (wrap && !wrap.contains(e.target)) {
            menu.style.display = 'none';
            btn.setAttribute('aria-expanded', 'false');
            document.removeEventListener('click', closeMenu);
          }
        };
        setTimeout(() => document.addEventListener('click', closeMenu), 0);
      }
    },

    _exportDashboardCandidates() {
      const menu = document.getElementById('dash-export-menu');
      if (menu) menu.style.display = 'none';

      const _all = App.state.candidates || [];
      const _filtered = App.state.filteredCandidates || [];
      const data = (_filtered.length > 0 && _filtered.length < _all.length)
        ? _filtered
        : _all;
      if (!data || !data.length) { Toast.warning('No candidates loaded yet.'); return; }
      const isFiltered = data.length < _all.length;

      const { docCompleteness } = App.state;
      const headers = [
        'CandidateID', 'FullName', 'Position', 'Department',
        'Email', 'Phone', 'Nationality', 'OfferSalary',
        'CurrentStatus', 'CreatedAt', 'UpdatedAt',
        'DocCompleteness%', 'PresentDocs', 'MissingDocs'
      ];
      const esc = v => '"' + (v || '').toString().replace(/"/g, '""') + '"';
      const rows = data.map(c => {
        const comp = docCompleteness[c.CandidateID];
        const pct = comp ? comp.pct : '';
        const present = comp ? comp.presentDocs.join('; ') : '';
        const missing = comp ? comp.missingDocs.join('; ') : '';
        return [
          esc(c.CandidateID), esc(c.FullName), esc(c.Position), esc(c.Department),
          esc(c.Email), esc(c.Phone), esc(c.Nationality), esc(c.OfferSalary),
          esc(c.CurrentStatus), esc(c.CreatedAt), esc(c.UpdatedAt),
          esc(pct), esc(present), esc(missing)
        ].join(',');
      });
      const csv = '\uFEFF' + [headers.join(',')].concat(rows).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'HR_Candidates_' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      Toast.success(
        isFiltered
          ? 'Exported ' + data.length + ' filtered candidates (out of ' + _all.length + ' total).'
          : 'Exported all ' + data.length + ' candidates to CSV!'
      );
    },

    _exportDashboardKPI() {
      const menu = document.getElementById('dash-export-menu');
      if (menu) menu.style.display = 'none';

      const k = Views._kpiData;
      if (!k) { Toast.warning('Dashboard not loaded yet. Please wait and try again.'); return; }

      const today = new Date().toLocaleDateString('en-GB');
      const rows = [
        'Category,Metric,Count',
        'Pipeline,Active Cases,' + (k.activeCount || 0),
        'Pipeline,Missing Documents,' + (k.missingDocs || 0),
        'Pipeline,Pending Medical,' + (k.pendingMedical || 0),
        'Pipeline,Booked Medical Exam,' + (k.bookedMedical || 0),
        'Pipeline,Docs Under Preparing,' + (k.docsUnderPreparing || 0),
        'Pipeline,Visa Pending,' + (k.visaPending || 0),
        'Pipeline,Visa Completed,' + (k.visaCompleted || 0),
        'Pipeline,Mobilized,' + (k.mobilized || 0),
        'Has Document,Has Passport,' + (k.hasPassport || 0),
        'Has Document,Has Photo,' + (k.hasPhoto || 0),
        'Has Document,Has Academic Cert.,' + (k.hasAcademicCert || 0),
        'Has Document,Has Medical Exam,' + (k.hasMedicalExam || 0),
        'Has Document,Has Med. Analysis,' + (k.hasMedicalAnalysis || 0),
        'Has Document,Has Visa,' + (k.hasVisa || 0),
        'Has Document,Has CV,' + (k.hasCV || 0),
        'Missing Document,Missing Passport,' + (k.missingPassport || 0),
        'Missing Document,Missing Photo,' + (k.missingPhoto || 0),
        'Missing Document,Missing Academic Cert.,' + (k.missingAcademicCert || 0),
        'Missing Document,Missing Medical Exam,' + (k.missingMedicalExam || 0),
        'Missing Document,Missing Med. Analysis,' + (k.missingMedicalAnalysis || 0),
        'Missing Document,Missing Visa,' + (k.missingVisa || 0),
        'Missing Document,Missing CV,' + (k.missingCV || 0),
        ',,',
        '"Report Date","' + today + '",'
      ];
      const csv = '\uFEFF' + rows.join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);

    // ── Load candidates then kick off batch completeness fetch ──
    async _loadCandidates() {
      try {
        const res = await GAS.call('api_getAllCandidates');
        if (!res.success) throw new Error(res.error);
        App.setState({ candidates: res.data, filteredCandidates: res.data });

        // Fetch upcoming events in the background to populate priority dots
        GAS.call('api_getAllUpcomingEvents').then(evRes => {
          if (evRes.success) {
            Views._candidateEventDots = Views._buildEventDotsMap(evRes.data);
            Views._renderCandidatesTable(App.state.filteredCandidates);
          }
        }).catch(() => { });

        // Render immediately (completeness cells will show "Loading…" state)
        Views._renderCandidatesTable(res.data);
        // Fire off batch completeness fetch in background
        Views._loadAllCompleteness(res.data);
      } catch (err) {
        document.getElementById('candidates-table').innerHTML =
          `<div class="table-empty"><div class="table-empty__icon">⚠️</div>Failed to load: ${escHtml(err.message)}</div>`;
        Toast.error('Failed to load candidates.');
      }
    },

    // ── Batch-fetch document completeness for every candidate ──
    // Reuses api_getDocumentsByCandidate + computeCompleteness — no duplication.
    async _loadAllCompleteness(candidates) {
      try {
        const results = await Promise.allSettled(
          candidates.map(c => GAS.call('api_getDocumentsByCandidate', c.CandidateID))
        );
        const completeness = {};
        results.forEach((result, i) => {
          const cand = candidates[i];
          completeness[cand.CandidateID] = (result.status === 'fulfilled' && result.value?.success)
            ? computeCompleteness(result.value.data)
            : { pct: 0, missingDocs: [...REQUIRED_DOCS], presentDocs: [] };
        });
        App.setState({ docCompleteness: completeness });
        // Re-render table now that completeness data is available — restore saved filters first
        Views._restoreFilterState();
      } catch (err) {
        console.error('Completeness batch load error:', err);
      }
    },

    // ── Combined filter + sort ──
    _filterCandidates() {
      const query = (document.getElementById('search-input')?.value || '').toLowerCase();
      const deptFilter = document.getElementById('dept-filter')?.value || '';
      const completionMin = parseInt(document.getElementById('completion-min')?.value || '0', 10);
      const { statusFilters, docFilters, docCompleteness, sortCol, sortDir } = App.state;

      let data = App.state.candidates.filter(c => {
        // Text search
        const matchQ = !query ||
          c.FullName?.toLowerCase().includes(query) ||
          c.Email?.toLowerCase().includes(query) ||
          c.Position?.toLowerCase().includes(query);
        // Multi-select status INCLUDE (empty array = all)
        const matchS = statusFilters.length === 0 || statusFilters.includes(c.CurrentStatus);
        // Multi-select status EXCLUDE (empty array = hide nothing)
        const { excludeStatusFilters } = App.state;
        const matchExcl = excludeStatusFilters.length === 0 || !excludeStatusFilters.includes(c.CurrentStatus);
        // Department
        const matchD = !deptFilter || c.Department === deptFilter;
        // Missing doc filter — candidate must be missing ANY of the selected doc types
        const comp = docCompleteness[c.CandidateID];
        const matchDoc = docFilters.length === 0 ||
          (comp && docFilters.some(doc => comp.missingDocs.includes(doc)));
        // Minimum completion %
        const matchCompletion = !comp || comp.pct >= completionMin;
        return matchQ && matchS && matchExcl && matchD && matchDoc && matchCompletion;
      });

      // Sorting
      if (sortCol) {
        data = [...data].sort((a, b) => {
          let valA, valB;
          if (sortCol === 'pct') {
            valA = docCompleteness[a.CandidateID]?.pct ?? -1;
            valB = docCompleteness[b.CandidateID]?.pct ?? -1;
          } else if (sortCol === 'missingCount') {
            valA = docCompleteness[a.CandidateID]?.missingDocs.length ?? REQUIRED_DOCS.length;
            valB = docCompleteness[b.CandidateID]?.missingDocs.length ?? REQUIRED_DOCS.length;
          } else {
            valA = (a[sortCol] || '').toString().toLowerCase();
            valB = (b[sortCol] || '').toString().toLowerCase();
          }
          if (valA < valB) return sortDir === 'asc' ? -1 : 1;
          if (valA > valB) return sortDir === 'asc' ? 1 : -1;
          return 0;
        });
      }

      App.setState({ filteredCandidates: data });
      Views._renderCandidatesTable(data);
    },

    _toggleDocFilter(docType) {

      const idx = filters.indexOf(docType);
      if (idx >= 0) filters.splice(idx, 1); else filters.push(docType);
      App.setState({ docFilters: filters });
      // Sync advanced-panel checkbox
      const cb = document.getElementById(`dc-${key}`);
      if (cb) cb.checked = filters.includes(docType);
      // Sync quick-filter button appearance
      const btn = document.getElementById(`qf-doc-${key}`);
      if (btn) {
        btn.classList.toggle('quick-filter-btn--active', filters.includes(docType));
        btn.setAttribute('aria-pressed', String(filters.includes(docType)));
      }
      Views._saveFilterState();
      Views._updateClearButton();
      Views._filterCandidates();
    },

    // ── Persist all filter state to localStorage ──
    _saveFilterState() {
      const deptEl = document.getElementById('dept-filter');

      const payload = {
        statusFilters: App.state.statusFilters,
        excludeStatusFilters: App.state.excludeStatusFilters,
        docFilters: App.state.docFilters,
        deptFilter: deptEl ? deptEl.value : '',
        completionMin: rangeEl ? parseInt(rangeEl.value, 10) : 0,
      };
      try { localStorage.setItem('hr_candidate_filters', JSON.stringify(payload)); } catch (_) { }

    // ── Restore filter state from localStorage and re-apply ──
    _restoreFilterState() {
      let saved;
      try { saved = JSON.parse(localStorage.getItem('hr_candidate_filters') || 'null'); } catch (_) { }
      if (!saved) return;

      // Restore state object
      App.setState({
        statusFilters: Array.isArray(saved.statusFilters) ? saved.statusFilters : [],
        excludeStatusFilters: Array.isArray(saved.excludeStatusFilters) ? saved.excludeStatusFilters : [],
        docFilters: Array.isArray(saved.docFilters) ? saved.docFilters : [],
      });

      // Restore Status checkboxes + quick-filter buttons
      document.querySelectorAll('.status-check').forEach(cb => {
        cb.checked = App.state.statusFilters.includes(cb.value);
      });
      ['Visa Pending', 'Visa Completed', 'Mobilized', 'Documents Complete'].forEach(st => {
        const btn = document.getElementById(`qf-status-${st.replace(/\s/g, '_')}`);
        if (btn) {
          const on = App.state.statusFilters.includes(st);
          btn.classList.toggle('quick-filter-btn--active', on);
          btn.setAttribute('aria-pressed', String(on));
        }
      });

      // Restore Exclude Status checkboxes
      document.querySelectorAll('.excl-status-check').forEach(cb => {
        cb.checked = App.state.excludeStatusFilters.includes(cb.value);
      });

      // Restore Doc checkboxes + quick-filter buttons
      document.querySelectorAll('.doc-check').forEach(cb => {
        cb.checked = App.state.docFilters.includes(cb.value);
      });
      ['Passport', 'Photo', 'Academic Certificate', 'Medical Examination', 'Medical Analysis', 'Visa', 'CV'].forEach(doc => {
        const btn = document.getElementById(`qf-doc-${doc.replace(/\s/g, '_')}`);
        if (btn) {
          const on = App.state.docFilters.includes(doc);
          btn.classList.toggle('quick-filter-btn--active', on);
          btn.setAttribute('aria-pressed', String(on));
        }
      });

      // Restore Department dropdown
      const deptEl = document.getElementById('dept-filter');
      if (deptEl && saved.deptFilter) deptEl.value = saved.deptFilter;

      // Restore Completion % range
      const rangeEl = document.getElementById('completion-min');
      const rangeVal = document.getElementById('completion-min-val');
      if (rangeEl && saved.completionMin != null) {
        rangeEl.value = saved.completionMin;
        if (rangeVal) rangeVal.textContent = saved.completionMin + '%';
      }

      Views._updateClearButton();
      Views._filterCandidates();
    },

      const wasHidden = panel.hidden;
      panel.hidden = !wasHidden;

      btn.classList.toggle('btn--primary', wasHidden);
      btn.classList.toggle('btn--outline', !wasHidden);

    _clearAllFilters() {

    // ── Sortable column header HTML helper ──
    _thSort(label, col) {
      const { sortCol, sortDir } = App.state;
      const active = sortCol === col;
      const arrow = active ? (sortDir === 'asc' ? '▲' : '▼') : '⇅';
      const ariaSort = active ? (sortDir === 'asc' ? 'ascending' : 'descending') : 'none';
      return `<th scope="col" class="th--sortable${active ? ' th--sorted' : ''}"
                  onclick="Views._sortBy('${col}')" aria-sort="${ariaSort}">${label}<span class="th-arrow" aria-hidden="true"> ${arrow}</span></th>`;
    },

    _buildEventDotsMap(events) {
      const rank = { High: 3, Medium: 2, Low: 1 };
      const map = {};
      (events || []).forEach(e => {
        if (e.Status !== 'Active') return;
        const cur = map[e.CandidateID];
        if (!cur || rank[e.Priority] > rank[cur]) {
          map[e.CandidateID] = e.Priority;
        }
      });
      return map;
    },

    _eventDotHtml(candidateId) {
      const p = (Views._candidateEventDots || {})[candidateId];
      if (!p) return '';
      const color = p === 'High' ? 'var(--danger)' : p === 'Medium' ? 'var(--warning)' : 'var(--success)';
      const label = `${p} priority upcoming event`;
      return `<span class="cand-event-dot" style="background:${color}" title="${label}" aria-label="${label}"></span>`;
    },

                    onclick="Router.navigate('candidate-detail',{selectedCandidate:${JSON.stringify(c).replace(/"/g, '&quot;')}})"
                    aria-label="View ${escHtml(c.FullName)} details">View</button>

      }).join('');

      return `

        <table>

    _exportCandidates() {
      const _all = App.state.candidates || [];
      const _filtered = App.state.filteredCandidates || [];

      // Use filtered list only when it's a real subset (filter is active)
      const data = (_filtered.length > 0 && _filtered.length < _all.length)
        ? _filtered
        : _all;

      if (!data || !data.length) {
        Toast.warning('No candidates to export.');
        return;
      }

      const isFiltered = data.length < _all.length;
      const { docCompleteness } = App.state;

      const headers = [
        'CandidateID', 'FullName', 'Position', 'Department',
        'Email', 'Phone', 'Nationality', 'OfferSalary',
        'CurrentStatus', 'CreatedAt', 'UpdatedAt',
        'DocCompleteness%', 'PresentDocs', 'MissingDocs'
      ];

      const esc = v => '"' + (v || '').toString().replace(/"/g, '""') + '"';

      const rows = data.map(c => {
        const comp = docCompleteness[c.CandidateID];
        const pct = comp ? comp.pct : '';
        const present = comp ? comp.presentDocs.join('; ') : '';
        const missing = comp ? comp.missingDocs.join('; ') : '';
        return [
          esc(c.CandidateID), esc(c.FullName), esc(c.Position), esc(c.Department),
          esc(c.Email), esc(c.Phone), esc(c.Nationality), esc(c.OfferSalary),
          esc(c.CurrentStatus), esc(c.CreatedAt), esc(c.UpdatedAt),
          esc(pct), esc(present), esc(missing)
        ].join(',');
      });

      const csv = '\uFEFF' + [headers.join(',')].concat(rows).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'HR_Candidates_' + new Date().toISOString().slice(0, 10) + '.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      Toast.success(
        isFiltered
          ? '✅ Exported ' + data.length + ' filtered candidates (out of ' + _all.length + ' total).'
          : '✅ Exported all ' + data.length + ' candidates.'
      );
    },

    async _loadCandidateDocuments(candidateId) {
      // Required documents for completeness calculation — must stay in sync with global REQUIRED_DOCS
      const REQUIRED_DOCS = ['Passport', 'Photo', 'Academic Certificate', 'Medical Examination', 'Medical Analysis', 'Visa', 'CV'];

      try {
        const res = await GAS.call('api_getDocumentsByCandidate', candidateId);
        if (!res.success) throw new Error(res.error);
        const docs = res.data;
        const el = document.getElementById('docs-section');

        // ── Document Completeness Panel ──────────────────────────────────
        const completenessEl = document.getElementById('doc-completeness');
        if (completenessEl) {
          // Map uploaded doc types (normalise for comparison)
          const uploadedTypes = new Set(
            docs
              .filter(d => d.ApprovalStatus !== 'Rejected')
              .map(d => (d.DocType || '').trim())
          );

          // Determine which required docs are present
          const presentDocs = REQUIRED_DOCS.filter(req => uploadedTypes.has(req));
          const missingDocs = REQUIRED_DOCS.filter(req => !uploadedTypes.has(req));
          const completedCount = presentDocs.length;
          const totalCount = REQUIRED_DOCS.length;
          const pct = Math.round((completedCount / totalCount) * 100);

          // Derive suggested auto-status
          let suggestedStatus = '';
          if (!uploadedTypes.has('Passport')) suggestedStatus = 'Pending Passport';
          else if (!uploadedTypes.has('Photo')) suggestedStatus = 'Pending Photo';
          else if (!uploadedTypes.has('Academic Certificate')) suggestedStatus = 'Pending Academic Certificate';
          else if (!uploadedTypes.has('Medical Examination')) suggestedStatus = 'Booked a medical examination';
          else if (!uploadedTypes.has('Medical Analysis')) suggestedStatus = 'Booked a medical examination';
          else suggestedStatus = 'Documents Complete';

          // Determine bar colour
          const barColor = pct === 100 ? 'var(--success)'
            : pct >= 50 ? 'var(--primary)'
              : 'var(--warning)';

          completenessEl.innerHTML = `
          <div class="doc-completeness__inner">
            <div class="doc-completeness__header">
              <span class="doc-completeness__title">📋 Document Completeness</span>
              <span class="doc-completeness__pct" style="color:${barColor}">${pct}%</span>
            </div>
            <div class="doc-completeness__bar-track" role="progressbar"
                 aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100"
                 aria-label="Document completeness ${pct}%">
              <div class="doc-completeness__bar-fill" style="width:${pct}%;background:${barColor}"></div>
            </div>
            <div class="doc-completeness__meta">
              <span>${completedCount} of ${totalCount} documents uploaded</span>
              ${suggestedStatus ? `<span>Suggested status: ${statusBadge(suggestedStatus)}</span>` : ''}
            </div>
            ${missingDocs.length ? `
            <div class="doc-completeness__missing">
              <span class="doc-completeness__missing-label">Missing:</span>
              ${missingDocs.map(d => `<span class="doc-chip doc-chip--missing">⚠ ${escHtml(d)}</span>`).join('')}
            </div>` : `
            <div class="doc-completeness__missing">
              <span class="doc-chip doc-chip--complete">✅ All required documents uploaded</span>
            </div>`}
          </div>`;
        }

        // ── Documents List ───────────────────────────────────────────────
        if (!el) return;

        if (!docs.length) {
          el.innerHTML = '<div class="table-empty"><div class="table-empty__icon">📭</div>No documents uploaded yet.</div>';
          return;
        }

        el.innerHTML = docs.map(d => `
        <div class="doc-row">
          <div class="doc-row__icon" aria-hidden="true">${d.FileName?.endsWith('.pdf') ? '📄' : '🖼️'}</div>
          <div class="doc-row__info">
            <div class="doc-row__name">${escHtml(d.DocType)} — v${d.VersionNumber || 1}</div>
            <div class="doc-row__meta">${escHtml(d.FileName)} · Uploaded ${fmt.date(d.UploadDate)}</div>
          </div>
          <div style="margin:0 var(--sp-2)">${statusBadge(d.ApprovalStatus)}</div>
          <div class="doc-row__actions">
            ${d.FileURL && d.FileURL !== '#' ? `<a href="${escHtml(d.FileURL)}" target="_blank" rel="noopener" class="btn btn--outline btn--sm" aria-label="View ${escHtml(d.DocType)}">View ↗</a>` : ''}
          </div>
        </div>`).join('');
      } catch (err) {
        const el = document.getElementById('docs-section');
        if (el) el.innerHTML = `<div class="table-empty">⚠️ ${escHtml(err.message)}</div>`;
        const completenessEl = document.getElementById('doc-completeness');
        if (completenessEl) completenessEl.innerHTML = '';
      }
    },

          <p style="font-size:.8rem;color:var(--text-secondary);margin-top:6px" id="upload-status-msg">Preparing…</p>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--outline" onclick="Modal.close()">Cancel</button>
        <button class="btn btn--primary" id="upload-btn"
                onclick="Views._submitUpload('${candidateId}','${folderId}')">Upload</button>
      </div>`);
    },

    _onFileSelect(input) {
      const file = input.files[0];
      if (file) {
        document.getElementById('upload-label').textContent = `📎 ${file.name} (${(file.size / 1024).toFixed(1)} KB)`;
      }
    },

    async _submitUpload(candidateId, folderId) {
      const fileInput = document.getElementById('upload-file');
      const docType = document.getElementById('doc-type')?.value;
      const file = fileInput?.files[0];

      if (!file) { Toast.warning('Please select a file.'); return; }
      if (file.size > 10 * 1024 * 1024) { Toast.warning('File exceeds 10 MB limit.'); return; }

      const btn = document.getElementById('upload-btn');
      btn.disabled = true;
      btn.innerHTML = `<span class="spinner"></span> Uploading…`;

      const progress = document.getElementById('upload-progress');
      const bar = document.getElementById('upload-bar');
      const statusMsg = document.getElementById('upload-status-msg');
      progress.style.display = 'block';

      try {
        // Read file as base64
        statusMsg.textContent = 'Reading file…';
        bar.style.width = '20%';

        const base64 = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = e => resolve(e.target.result.split(',')[1]);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

        statusMsg.textContent = 'Uploading to Google Drive…';
        bar.style.width = '60%';

        // Ensure folder exists
        let actualFolderId = folderId;
        if (!actualFolderId) {
          const cand = App.state.selectedCandidate;
          const folderRes = await GAS.call('api_createCandidateFolder', candidateId, cand?.FullName || candidateId);
          if (!folderRes.success) throw new Error(folderRes.error);
          actualFolderId = folderRes.folderId;
        }

        const res = await GAS.call('api_uploadFileToDrive', candidateId, actualFolderId, docType, file.name, base64, file.type);
        if (!res.success) throw new Error(res.error);

        bar.style.width = '100%';
        statusMsg.textContent = 'Complete!';

        setTimeout(() => {
          Modal.close();
          Toast.success(`${docType} uploaded successfully!`);
          Views._loadCandidateDocuments(candidateId);
          Views._loadCandidateAudit(candidateId);
        }, 500);
      } catch (err) {
        Toast.error('Upload failed: ' + err.message);
        btn.disabled = false;
        btn.innerHTML = 'Upload';
        progress.style.display = 'none';
      }
    },

    _allLogs: [],

    async _loadAllAuditLogs() {

        const cands = candsRes.data.slice(0, 20); // limit for performance

        const results = await Promise.all(logPromises);

        Views._allLogs = results.flatMap((r, i) =>
          r.success ? r.data.map(l => ({ ...l, _candidateName: cands[i].FullName })) : []
        ).sort((a, b) => new Date(b.Timestamp) - new Date(a.Timestamp));

        Views._renderAuditTable(Views._allLogs);

        document.getElementById('audit-tbody').innerHTML =
          `<tr><td colspan="4"><div class="table-empty">⚠️ ${escHtml(err.message)}</div></td></tr>`;

        ? Views._allLogs.filter(l => l._candidateName?.toLowerCase().includes(q) || l.Event?.toLowerCase().includes(q) || l.Actor?.toLowerCase().includes(q))
        : Views._allLogs;

    async calendar(container) {
      container.innerHTML = `

      <div class="calendar-grid">

        <div class="calendar-sidebar">
           <div class="kpi-card kpi-card--blue">
             <div class="kpi-card__label">Active Events</div>
             <div class="kpi-card__value" id="cal-kpi-active">--</div>
             <div class="kpi-card__icon" aria-hidden="true">📅</div>
           </div>

      }
    },

    _applyCalendarFilter(filterName, btnEl) {
      Views._calendarSelectedDate = null;
      if (document.getElementById('month-calendar')) Views._renderMonthCalendar();
      const agendaTitleEl = document.getElementById('calendar-agenda-title');
      if (agendaTitleEl) agendaTitleEl.textContent = 'Upcoming Events';

      if (btnEl) {
        document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('quick-filter-btn--active'));
        btnEl.classList.add('quick-filter-btn--active');
      } else {
        document.querySelectorAll('.quick-filter-btn').forEach(b => {
          if (b.dataset.calFilter === filterName) b.classList.add('quick-filter-btn--active');
          else b.classList.remove('quick-filter-btn--active');
        });
      }

      const all = App.state.calendarEvents || [];
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const tomorrow = new Date(today);
      tomorrow.setDate(tomorrow.getDate() + 1);
      const nextWeek = new Date(today);
      nextWeek.setDate(nextWeek.getDate() + 7);

      let filtered = all;

      if (filterName === 'Today') {
        filtered = all.filter(e => {
          const d = new Date(e.EventDate);
          return d.getTime() === today.getTime();
        });
      } else if (filterName === 'Tomorrow') {
        filtered = all.filter(e => {
          const d = new Date(e.EventDate);
          return d.getTime() === tomorrow.getTime();
        });
      } else if (filterName === 'ThisWeek') {
        filtered = all.filter(e => {
          const d = new Date(e.EventDate);
          return d >= today && d <= nextWeek;
        });
      } else if (filterName === 'Overdue') {
        filtered = all.filter(e => {
          const d = new Date(e.EventDate);
          return d < today;
        });
      } else if (filterName === 'HighPriority') {
        filtered = all.filter(e => e.Priority === 'High');
      }

      // Sort chronologically
      filtered.sort((a, b) => new Date(a.EventDate) - new Date(b.EventDate));

      Views._renderEventList(filtered, 'calendar-event-list');
    },

    _renderMonthCalendar() {
      const el = document.getElementById('month-calendar');
      if (!el) return;

      const cursor = Views._calendarCursor || (Views._calendarCursor = new Date());
      const year = cursor.getFullYear();
      const month = cursor.getMonth();
      const monthLabel = cursor.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      const firstDay = new Date(year, month, 1);
      const startOffset = firstDay.getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const events = App.state.calendarEvents || [];
      const eventsByDay = {};
      events.forEach(e => {
        const key = e.EventDate;
        if (!key) return;
        if (!eventsByDay[key]) eventsByDay[key] = [];
        eventsByDay[key].push(e);
      });

      const weekDays = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      let cellsHtml = '';

      for (let i = startOffset - 1; i >= 0; i--) {
        const d = daysInPrevMonth - i;
        cellsHtml += `<div class="month-calendar__day month-calendar__day--muted"><div class="month-calendar__day-num">${d}</div></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateObj = new Date(year, month, d);
        const dateKey = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        const dayEvents = eventsByDay[dateKey] || [];
        const isToday = dateObj.getTime() === today.getTime();
        const isSelected = Views._calendarSelectedDate === dateKey;

        let dotsHtml = '';
        if (dayEvents.length > 0) {
          const shown = dayEvents.slice(0, 3);
          dotsHtml = `<div class="month-calendar__dots">` +
            shown.map(e => `<span class="month-calendar__dot month-calendar__dot--${(e.Priority || 'medium').toLowerCase()}" title="${escHtml(e.Title)}"></span>`).join('') +
            (dayEvents.length > 3 ? `<span class="month-calendar__more">+${dayEvents.length - 3}</span>` : '') +
            `</div>`;
        }

        cellsHtml += `
          <div class="month-calendar__day ${isToday ? 'month-calendar__day--today' : ''} ${dayEvents.length ? 'month-calendar__day--has-events' : ''} ${isSelected ? 'month-calendar__day--selected' : ''}"
               onclick="Views._selectCalendarDay('${dateKey}')">
            <div class="month-calendar__day-num">${d}</div>
            ${dotsHtml}
          </div>`;
      }

      const totalCells = startOffset + daysInMonth;
      const trailing = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
      for (let d = 1; d <= trailing; d++) {
        cellsHtml += `<div class="month-calendar__day month-calendar__day--muted"><div class="month-calendar__day-num">${d}</div></div>`;
      }

      el.innerHTML = `
        <div class="month-calendar__header">
          <button class="btn btn--icon btn--outline" onclick="Views._calNavigate(-1)" aria-label="Previous month">‹</button>
          <div class="month-calendar__label">${monthLabel}</div>
          <button class="btn btn--icon btn--outline" onclick="Views._calNavigate(1)" aria-label="Next month">›</button>
          <button class="btn btn--outline btn--sm month-calendar__today-btn" onclick="Views._calGoToday()">Today</button>
        </div>
        <div class="month-calendar__weekdays">
          ${weekDays.map(w => `<div class="month-calendar__weekday">${w}</div>`).join('')}
        </div>
        <div class="month-calendar__days">
          ${cellsHtml}
        </div>
      `;
    },

    _calNavigate(delta) {
      const c = Views._calendarCursor || new Date();
      Views._calendarCursor = new Date(c.getFullYear(), c.getMonth() + delta, 1);
      Views._renderMonthCalendar();
    },

    _calGoToday() {
      Views._calendarCursor = new Date();
      Views._calendarSelectedDate = null;
      Views._renderMonthCalendar();
      const agendaTitleEl = document.getElementById('calendar-agenda-title');
      if (agendaTitleEl) agendaTitleEl.textContent = 'Upcoming Events';
      const initialFilter = App.state.filter || 'All';
      const btn = document.querySelector(`button[data-cal-filter="${initialFilter}"]`);
      Views._applyCalendarFilter(initialFilter, btn);
    },

    _selectCalendarDay(dateKey) {
      Views._calendarSelectedDate = (Views._calendarSelectedDate === dateKey) ? null : dateKey;
      Views._renderMonthCalendar();

      document.querySelectorAll('.quick-filter-btn').forEach(b => b.classList.remove('quick-filter-btn--active'));

      const agendaTitleEl = document.getElementById('calendar-agenda-title');
      const all = App.state.calendarEvents || [];

      if (Views._calendarSelectedDate) {
        const dayEvents = all
          .filter(e => e.EventDate === dateKey)
          .sort((a, b) => (a.EventTime || '').localeCompare(b.EventTime || ''));
        const [y, m, d] = dateKey.split('-').map(Number);
        const label = new Date(y, m - 1, d).toLocaleDateString('en-GB', { weekday: 'long', day: '2-digit', month: 'long' });
        if (agendaTitleEl) agendaTitleEl.textContent = `Events on ${label}`;
        Views._renderEventList(dayEvents, 'calendar-event-list', 'No events scheduled for this day.');
      } else {
        if (agendaTitleEl) agendaTitleEl.textContent = 'Upcoming Events';
        const initialFilter = App.state.filter || 'All';
        const btn = document.querySelector(`button[data-cal-filter="${initialFilter}"]`);
        Views._applyCalendarFilter(initialFilter, btn);
      }
    },

    _renderEventList(events, containerId, noDataMsg = 'No upcoming events found.') {
      const el = document.getElementById(containerId);
      if (!el) return;

      if (events.length === 0) {
        el.innerHTML = `<div class="table-empty"><div class="table-empty__icon">📅</div>${noDataMsg}</div>`;
        return;
      }

      el.innerHTML = events.map(e => {
        const d = new Date(e.EventDate);
        const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short' });
        const isPast = d < new Date(new Date().setHours(0, 0, 0, 0));

        return `
        <div class="event-card">
          <div class="event-card__header">
            <div>
              <div class="event-card__title">${escHtml(e.Title)} ${isPast && e.Status === 'Active' ? '<span style="color:var(--danger);font-size:.75rem">⚠️ Overdue</span>' : ''}</div>
              <div class="event-card__subtitle">Candidate: <strong>${escHtml(e.CandidateName)}</strong></div>
            </div>
            <div class="priority-badge priority-badge--${(e.Priority || 'medium').toLowerCase()}">${escHtml(e.Priority)}</div>
          </div>
          
          <div class="event-card__meta">
            <div class="event-card__meta-item">
              <span>📅</span> ${dateStr} ${e.EventTime ? 'at ' + e.EventTime : '(All Day)'}
            </div>
            ${e.CandidatePhone ? `
            <div class="event-card__meta-item">
              <span>📞</span> <span class="event-card__phone" title="Double-click to select, then copy">${escHtml(e.CandidatePhone)}</span>
            </div>` : ''}
            ${e.GoogleCalendarLink ? `
            <div class="event-card__meta-item">
              <span>🔗</span> <a href="${e.GoogleCalendarLink}" target="_blank" rel="noopener">Open in GCal ↗</a>
            </div>` : ''}
          </div>
          
          ${e.Description ? `<div style="font-size:.8rem;margin-top:4px;white-space:pre-wrap;color:var(--text-secondary)">${escHtml(e.Description)}</div>` : ''}
          
          <div class="event-card__actions">
            ${e.Status === 'Active' ? `<button class="btn btn--outline btn--sm" onclick="Views._markEventComplete('${e.EventID}')">✔️ Mark Completed</button>` : `<span class="event-status event-status--${e.Status.toLowerCase()}">${e.Status}</span>`}
          </div>
        </div>`;
      }).join('');
    },

    async _loadCandidateEvents(candidateId) {
      try {
        const res = await GAS.call('api_getEventsByCandidate', candidateId);
        if (res.success) {
          Views._renderEventList(res.data, 'events-section', 'No events scheduled for this candidate.');
        } else {
          document.getElementById('events-section').innerHTML = '<div class="form-error">Failed to load events.</div>';
        }
      } catch (err) {
        document.getElementById('events-section').innerHTML = '<div class="form-error">Error loading events.</div>';
      }
    },

    _openEventModal(candidateId) {
      Modal.open(`
        <div class="modal__header">
          <div class="modal__title">📅 Schedule Follow-up Event</div>
          <button class="modal__close" onclick="Modal.close()" aria-label="Close">✕</button>
        </div>
        <div class="modal__body">
          <form id="eventForm" class="form-grid" onsubmit="Views._submitEvent(event, '${candidateId}')">
            
            <div class="form-group col-span-2">
              <label class="form-label">Event Title <span class="required">*</span></label>
              <input type="text" id="evTitle" class="form-input" required placeholder="e.g. Passport Collection">
            </div>
            
            <div class="form-group">
              <label class="form-label">Date <span class="required">*</span></label>
              <input type="date" id="evDate" class="form-input" required>
            </div>
            
            <div class="form-group">
              <label class="form-label">Time <span style="font-weight:normal;color:var(--text-muted)">(Optional - leave blank for all day)</span></label>
              <input type="time" id="evTime" class="form-input">
            </div>
            
            <div class="form-group">
              <label class="form-label">Priority</label>
              <select id="evPriority" class="form-select">
                <option value="Low">Low</option>
                <option value="Medium" selected>Medium</option>
                <option value="High">High</option>
              </select>
            </div>
            
            <div class="form-group">
              <label class="form-label">Reminder <span style="font-weight:normal;color:var(--text-muted)">(Minutes before)</span></label>
              <input type="number" id="evReminder" class="form-input" value="30" min="0">
            </div>

            <div class="form-group col-span-2">
              <label class="form-label">Description / Notes</label>
              <textarea id="evDescription" class="form-textarea" rows="3" placeholder="Additional details to include in the calendar invite..."></textarea>
            </div>
          </form>
        </div>
        <div class="modal__footer">
          <button class="btn btn--ghost" onclick="Modal.close()">Cancel</button>
          <button class="btn btn--primary" type="submit" form="eventForm" id="btnSubmitEvent">Schedule Event</button>
        </div>
      `);

      // Default to tomorrow
      const tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      document.getElementById('evDate').value = tomorrow.toISOString().split('T')[0];
    },

    async _submitEvent(e, candidateId) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmitEvent');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Scheduling...';

      const payload = {
        title: document.getElementById('evTitle').value,
        eventDate: document.getElementById('evDate').value,
        eventTime: document.getElementById('evTime').value,
        priority: document.getElementById('evPriority').value,
        reminderMinutesBefore: document.getElementById('evReminder').value,
        description: document.getElementById('evDescription').value
      };

      try {
        const res = await GAS.call('api_createCalendarEvent', candidateId, payload);
        if (res.success) {
          Toast.success('Calendar event scheduled.');
          Modal.close();
          Views._loadCandidateEvents(candidateId);
        } else {
          Toast.error(res.error || 'Failed to schedule event.');
          btn.disabled = false;
          btn.innerHTML = 'Schedule Event';
        }
      } catch (err) {
        Toast.error('An unexpected error occurred.');
        btn.disabled = false;
        btn.innerHTML = 'Schedule Event';
      }
    },

    async _markEventComplete(eventId) {
      if (!confirm('Mark this event as completed?')) return;
      try {
        const res = await GAS.call('api_markEventCompleted', eventId);
        if (res.success) {
          Toast.success('Event marked as completed.');
          // Refresh current view (could be candidate detail or calendar view)
          const cv = App.state.currentView;
          if (cv === 'calendar') Router.navigate('calendar');
          else if (cv === 'candidate-detail') Views._loadCandidateEvents(App.state.selectedCandidate.CandidateID);
        } else {
          Toast.error(res.error || 'Failed to update event.');
        }
      } catch (err) {
        Toast.error('An unexpected error occurred.');
      }
    }
  };

  // ─────────────────────────────────────────────
  // APP INIT
  // ─────────────────────────────────────────────

  const initApp = () => {
    // Resolve current user email if in GAS environment
    if (GAS.isLive && typeof google !== 'undefined') {
      try {
        // Attempt to pre-fetch user info (non-blocking)
      } catch (_) { }
    }

    // Initialize sidebar state
    const savedSidebar = localStorage.getItem('hr_sidebar_collapsed');
    const shouldCollapse = savedSidebar === 'true' || window.innerWidth < 768;
    App.toggleSidebar(shouldCollapse);

    // Auto-collapse on small screens during resize
    window.addEventListener('resize', () => {
      if (window.innerWidth < 768 && !App.state.sidebarCollapsed) {
        App.toggleSidebar(true);
      }
    });

    renderTopbar();
    renderSidebar();
    Router.navigate('candidates');
  };

  document.addEventListener('DOMContentLoaded', initApp);
</script>
